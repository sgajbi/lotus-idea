version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    groups:
      python-dependency-closure-roots:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:05"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
