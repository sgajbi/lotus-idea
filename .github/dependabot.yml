version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Singapore"
    # Routine version-update PRs are paused during RFC implementation.
    # Security alerts/updates stay governed through GitHub Security posture.
    open-pull-requests-limit: 0
    groups:
      python-dependency-closure-roots:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:05"
      timezone: "Asia/Singapore"
    # Routine version-update PRs are paused during RFC implementation.
    # Security alerts/updates stay governed through GitHub Security posture.
    open-pull-requests-limit: 0
    groups:
      github-actions:
        patterns:
          - "*"
