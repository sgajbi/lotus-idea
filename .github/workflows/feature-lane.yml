name: Remote Feature Lane

on:
  push:
    branches-ignore:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "init.defaultBranch"
  GIT_CONFIG_VALUE_0: "main"

jobs:
  workflow-lint:
    name: Feature Lane / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: local
          fail_on_error: true

  lint-typecheck-security:
    name: Feature Lane / Lint Typecheck Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Verify Dependencies
        run: ./.venv/bin/python -m pip check
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Architecture Boundary Gate
        run: make architecture-boundary-gate
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: Security Audit
        run: make security-audit

  unit-tests:
    name: Feature Lane / Tests (unit)
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run unit tests
        run: make test-unit

  ci-signal-evidence:
    name: Feature Lane / CI Signal Evidence
    if: always()
    needs: [workflow-lint, lint-typecheck-security, unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Fetch run job metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/ci/fetch_github_actions_jobs.py --output ci-jobs.json
      - name: Generate CI signal evidence
        run: python scripts/ci_signal_evidence.py --jobs-json ci-jobs.json --output ci-signal-evidence.json
      - name: Upload CI signal evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: feature-lane-ci-signal-evidence
          path: ci-signal-evidence.json
          if-no-files-found: error
