name: Pull Request Merge Gate

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"
  CONTAINER_BASE_IMAGE: "python:3.12-slim"
  TRIVY_IMAGE: "aquasec/trivy:0.71.2"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "init.defaultBranch"
  GIT_CONFIG_VALUE_0: "main"

jobs:
  workflow-lint:
    name: PR Merge Gate / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0

  lint-typecheck-security:
    name: PR Merge Gate / Lint Typecheck Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Verify Dependencies
        run: ./.venv/bin/python -m pip check
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Architecture Boundary Gate
        run: make architecture-boundary-gate
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: Security Audit
        run: make security-audit

  test-suites:
    name: PR Merge Gate / Tests (${{ matrix.suite }})
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
          - suite: integration
          - suite: e2e
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run tests with coverage data
        run: make test-${{ matrix.suite }}-coverage
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-${{ matrix.suite }}
          path: .coverage.${{ matrix.suite }}
          include-hidden-files: true
          if-no-files-found: error

  coverage-gate:
    name: PR Merge Gate / Coverage Gate (Combined)
    needs: [test-suites]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-data-*
          merge-multiple: true
          path: coverage-data
      - name: Enforce 99% coverage
        run: make coverage-gate COVERAGE_DATA_DIR=coverage-data

  postgres-runtime-proof:
    name: PR Merge Gate / PostgreSQL Runtime Proof
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: lotus_idea
          POSTGRES_PASSWORD: lotus_idea
          POSTGRES_USER: lotus_idea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lotus_idea -d lotus_idea"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LOTUS_IDEA_POSTGRES_INTEGRATION_REQUIRED: "1"
      LOTUS_IDEA_POSTGRES_INTEGRATION_URL: postgresql://lotus_idea:lotus_idea@localhost:5432/lotus_idea
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run PostgreSQL runtime proof
        run: make postgres-integration-gate

  docker-build:
    name: PR Merge Gate / Validate Docker Build
    needs: [coverage-gate, postgres-runtime-proof]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build Docker image
        run: make docker-build
      - name: Scan Docker image
        run: make container-image-scan
