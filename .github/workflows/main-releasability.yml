name: Main Releasability Gate

on:
  # Merged PRs use merged-pr-main-releasability.yml as the authoritative
  # post-merge trigger. Keep this workflow dispatch-only to avoid paired
  # cancelled push runs for the same main commit.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  packages: write
  id-token: write
  attestations: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"
  CONTAINER_IMAGE_NAME: "lotus-idea:${{ github.sha }}"
  CONTAINER_BASE_IMAGE: "python:3.12-slim"
  TRIVY_IMAGE: "aquasec/trivy:0.71.2"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "init.defaultBranch"
  GIT_CONFIG_VALUE_0: "main"

jobs:
  workflow-lint:
    name: Main Releasability / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0

  lint-typecheck-security:
    name: Main Releasability / Lint Typecheck Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Verify Dependencies
        run: ./.venv/bin/python -m pip check
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Architecture Boundary Gate
        run: make architecture-boundary-gate
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: Security Audit
        run: make security-audit

  test-suites:
    name: Main Releasability / Tests (${{ matrix.suite }})
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
          - suite: integration
          - suite: e2e
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run tests with coverage data
        run: make test-${{ matrix.suite }}-coverage
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-${{ matrix.suite }}
          path: .coverage.${{ matrix.suite }}
          include-hidden-files: true
          if-no-files-found: error

  coverage-gate:
    name: Main Releasability / Coverage Gate (Combined)
    needs: [test-suites]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-data-*
          merge-multiple: true
          path: coverage-data
      - name: Enforce 99% coverage
        run: make coverage-gate COVERAGE_DATA_DIR=coverage-data
      - name: Upload coverage summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main-releasability-coverage-data
          path: |
            .coverage
            coverage-data
          include-hidden-files: true
          if-no-files-found: error

  postgres-runtime-proof:
    name: Main Releasability / PostgreSQL Runtime Proof
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: lotus_idea
          POSTGRES_PASSWORD: lotus_idea
          POSTGRES_USER: lotus_idea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lotus_idea -d lotus_idea"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LOTUS_IDEA_POSTGRES_INTEGRATION_REQUIRED: "1"
      LOTUS_IDEA_POSTGRES_INTEGRATION_URL: postgresql://lotus_idea:lotus_idea@localhost:5432/lotus_idea
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run PostgreSQL runtime proof
        run: make postgres-integration-gate

  docker-build:
    name: Main Releasability / Validate Docker Build
    needs: [coverage-gate, postgres-runtime-proof]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Resolve release image reference
        id: release-image-metadata
        shell: bash
        run: |
          set -euo pipefail

          release_image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_image_tag="$GITHUB_SHA"
          release_image_ref="${release_image_repository}:${release_image_tag}"
          build_timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          image_build_id="${GITHUB_SHA}.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"

          {
            echo "CONTAINER_IMAGE_NAME=$release_image_ref"
            echo "RELEASE_IMAGE_REPOSITORY=$release_image_repository"
            echo "RELEASE_IMAGE_TAG=$release_image_tag"
            echo "BUILD_TIMESTAMP=$build_timestamp"
            echo "BUILD_IMAGE_BUILD_ID=$image_build_id"
          } >> "$GITHUB_ENV"

          {
            echo "image_repository=$release_image_repository"
            echo "image_tag=$release_image_tag"
            echo "image_ref=$release_image_ref"
          } >> "$GITHUB_OUTPUT"
      - name: Install
        run: make install
      - name: Build Docker image
        run: make docker-build
      - name: Smoke test Docker runtime
        run: make container-runtime-smoke
      - name: Scan Docker image
        run: make container-image-scan
      - name: Resolve container image provenance
        shell: bash
        run: |
          set -euo pipefail

          docker pull "$CONTAINER_BASE_IMAGE" >/dev/null
          docker pull "$TRIVY_IMAGE" >/dev/null

          base_image_digest="$(
            docker image inspect "$CONTAINER_BASE_IMAGE" \
              --format '{{range .RepoDigests}}{{println .}}{{end}}' | head -n 1
          )"
          scanner_image_digest="$(
            docker image inspect "$TRIVY_IMAGE" \
              --format '{{range .RepoDigests}}{{println .}}{{end}}' | head -n 1
          )"
          service_image_id="$(
            docker image inspect "$CONTAINER_IMAGE_NAME" --format '{{.Id}}'
          )"

          if [[ -z "$base_image_digest" ]]; then
            echo "Unable to resolve Docker base image digest for $CONTAINER_BASE_IMAGE" >&2
            exit 1
          fi
          if [[ -z "$scanner_image_digest" ]]; then
            echo "Unable to resolve Trivy scanner image digest for $TRIVY_IMAGE" >&2
            exit 1
          fi
          if [[ -z "$service_image_id" ]]; then
            echo "Unable to resolve built service image id for $CONTAINER_IMAGE_NAME" >&2
            exit 1
          fi

          {
            echo "CONTAINER_IMAGE_ID=$service_image_id"
            echo "CONTAINER_BASE_IMAGE_DIGEST=$base_image_digest"
            echo "TRIVY_IMAGE_DIGEST=$scanner_image_digest"
          } >> "$GITHUB_ENV"
      - name: Generate dependency SBOM
        run: make release-sbom
      - name: Authenticate to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
      - name: Push commit-tagged image and resolve digest
        id: publish-image
        shell: bash
        run: |
          set -euo pipefail

          docker push "$CONTAINER_IMAGE_NAME"
          release_image_digest="$(
            docker buildx imagetools inspect "$CONTAINER_IMAGE_NAME" \
              --format '{{json .Manifest.Digest}}' | tr -d '"'
          )"
          if [[ "$release_image_digest" != sha256:* ]]; then
            echo "Unable to resolve registry digest for $CONTAINER_IMAGE_NAME" >&2
            exit 1
          fi
          release_image_digest_ref="${RELEASE_IMAGE_REPOSITORY}@${release_image_digest}"

          {
            echo "RELEASE_IMAGE_DIGEST=$release_image_digest"
            echo "RELEASE_IMAGE_DIGEST_REF=$release_image_digest_ref"
          } >> "$GITHUB_ENV"
          {
            echo "image_digest=$release_image_digest"
            echo "image_digest_ref=$release_image_digest_ref"
          } >> "$GITHUB_OUTPUT"
      - name: Inspect and run published digest
        shell: bash
        run: |
          set -euo pipefail

          docker pull "$RELEASE_IMAGE_DIGEST_REF"
          docker image inspect "$RELEASE_IMAGE_DIGEST_REF" \
            --format '{{json .Config.Labels}}' > release-image-labels.json
          ./.venv/bin/python scripts/container_runtime_smoke.py \
            --image-name "$RELEASE_IMAGE_DIGEST_REF" \
            --container-name lotus-idea-release-identity-smoke \
            --host-port 18331 \
            --release-image-digest "$RELEASE_IMAGE_DIGEST" \
            --release-image-digest-reference "$RELEASE_IMAGE_DIGEST_REF" \
            > release-runtime-smoke.json
      - uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0
        with:
          cosign-release: v2.6.0
      - name: Sign published image digest
        shell: bash
        run: cosign sign --yes "${RELEASE_IMAGE_DIGEST_REF}"
      - name: Generate provenance attestation
        id: attest-provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.release-image-metadata.outputs.image_repository }}
          subject-digest: ${{ steps.publish-image.outputs.image_digest }}
          push-to-registry: true
      - name: Generate SBOM attestation
        id: attest-sbom
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.release-image-metadata.outputs.image_repository }}
          subject-digest: ${{ steps.publish-image.outputs.image_digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true
      - name: Generate release metadata manifest
        shell: python
        env:
          PROVENANCE_ATTESTATION_URL: ${{ steps.attest-provenance.outputs.attestation-url }}
          SBOM_ATTESTATION_URL: ${{ steps.attest-sbom.outputs.attestation-url }}
        run: |
          import hashlib
          import json
          import os
          from pathlib import Path

          policy = json.loads(
              Path("contracts/compliance/lotus-idea-license-policy.v1.json").read_text(
                  encoding="utf-8"
              )
          )
          sbom = json.loads(Path("sbom.cdx.json").read_text(encoding="utf-8"))
          notice_sha256 = hashlib.sha256(Path("THIRD_PARTY_NOTICES.md").read_bytes()).hexdigest()

          Path("release-evidence.json").write_text(
              json.dumps(
                  {
                      "repository": os.environ["GITHUB_REPOSITORY"],
                      "commit_sha": os.environ["GITHUB_SHA"],
                      "branch": os.environ["GITHUB_REF_NAME"],
                      "build_timestamp": os.environ["BUILD_TIMESTAMP"],
                      "repository_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}",
                      "image_build_id": os.environ["BUILD_IMAGE_BUILD_ID"],
                      "image_identity_contract": "lotus.image-identity.v1",
                      "registry_digest_binding": "runtime_release_manifest",
                      "ref": os.environ["GITHUB_REF"],
                      "workflow": os.environ["GITHUB_WORKFLOW"],
                      "run_id": os.environ["GITHUB_RUN_ID"],
                      "dockerfile_path": "Dockerfile",
                      "container_image": os.environ["CONTAINER_IMAGE_NAME"],
                      "container_image_repository": os.environ["RELEASE_IMAGE_REPOSITORY"],
                      "container_image_tag": os.environ["RELEASE_IMAGE_TAG"],
                      "container_image_id": os.environ["CONTAINER_IMAGE_ID"],
                      "container_image_digest": os.environ["RELEASE_IMAGE_DIGEST"],
                      "container_image_digest_reference": os.environ[
                          "RELEASE_IMAGE_DIGEST_REF"
                      ],
                      "container_image_push_authority": (
                          "CI-only publish from main-releasability.yml after release "
                          "gates, scan, smoke, and SBOM generation pass."
                      ),
                      "promotion_policy": (
                          "Promote the same container_image_digest_reference across "
                          "environments; do not rebuild per environment."
                      ),
                      "kubernetes_deployment_reference": os.environ[
                          "RELEASE_IMAGE_DIGEST_REF"
                      ],
                      "image_signature": {
                          "tool": "cosign",
                          "mode": "keyless",
                          "subject": os.environ["RELEASE_IMAGE_DIGEST_REF"],
                      },
                      "provenance_attestation": {
                          "tool": "actions/attest-build-provenance",
                          "subject": os.environ["RELEASE_IMAGE_DIGEST_REF"],
                          "url": os.environ["PROVENANCE_ATTESTATION_URL"],
                      },
                      "docker_base_image": os.environ["CONTAINER_BASE_IMAGE"],
                      "docker_base_image_resolved_digest": os.environ[
                          "CONTAINER_BASE_IMAGE_DIGEST"
                      ],
                      "sboms": [
                          {
                              "path": "sbom.cdx.json",
                              "scope": "runtime_python_dependencies",
                              "target_artifact": os.environ["RELEASE_IMAGE_DIGEST_REF"],
                              "target_artifact_id": os.environ["CONTAINER_IMAGE_ID"],
                              "target_artifact_digest": os.environ["RELEASE_IMAGE_DIGEST"],
                              "dependency_source": "requirements/runtime-resolved.lock.txt",
                              "project_metadata": "pyproject.toml",
                              "generator": "cyclonedx-bom==7.3.0",
                              "format": "CycloneDX JSON",
                              "non_proof_boundary": (
                                  "Runtime Python dependency SBOM only; container OS "
                                  "package posture is covered by the Trivy image scan."
                              ),
                          }
                      ],
                      "container_scan_path": "output/security/container-image-scan.trivy.json",
                      "container_scanner": os.environ["TRIVY_IMAGE"],
                      "container_scanner_resolved_digest": os.environ[
                          "TRIVY_IMAGE_DIGEST"
                      ],
                      "sbom_attestation": {
                          "tool": "actions/attest",
                          "subject": os.environ["RELEASE_IMAGE_DIGEST_REF"],
                          "url": os.environ["SBOM_ATTESTATION_URL"],
                      },
                      "license_compliance": {
                          "policy_contract": (
                              "contracts/compliance/lotus-idea-license-policy.v1.json"
                          ),
                          "policy_version": policy["contract_version"],
                          "runtime_lock_sha256": policy["runtime_lock"]["sha256"],
                          "ci_lock_sha256": policy["ci_lock"]["sha256"],
                          "notice_path": policy["notice_path"],
                          "notice_sha256": notice_sha256,
                          "sbom_serial_number": sbom["serialNumber"],
                          "exception_ids": sorted(
                              item["exception_id"] for item in policy["exceptions"]
                          ),
                          "target_artifact": os.environ["RELEASE_IMAGE_DIGEST_REF"],
                      },
                      "ci_signal_evidence_path": "ci-signal-evidence.json",
                      "ci_signal_evidence_artifact": "main-releasability-ci-signal-evidence",
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
      - name: Validate release image identity binding
        run: make release-image-identity-contract-gate
      - name: Validate release license evidence binding
        run: make license-release-evidence-gate
      - name: Upload release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main-releasability-release-evidence
          path: |
            sbom.cdx.json
            output/security/container-image-scan.trivy.json
            release-evidence.json
            release-image-labels.json
            release-runtime-smoke.json
            LICENSE
            THIRD_PARTY_NOTICES.md
            contracts/compliance/lotus-idea-license-policy.v1.json
          if-no-files-found: error

  ci-signal-evidence:
    name: Main Releasability / CI Signal Evidence
    if: always()
    needs:
      [
        workflow-lint,
        lint-typecheck-security,
        test-suites,
        coverage-gate,
        postgres-runtime-proof,
        docker-build,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Fetch run job metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" > ci-jobs.json
      - name: Generate CI signal evidence
        run: python scripts/ci_signal_evidence.py --jobs-json ci-jobs.json --output ci-signal-evidence.json
      - name: Upload CI signal evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: main-releasability-ci-signal-evidence
          path: ci-signal-evidence.json
          if-no-files-found: error
