name: Main Releasability Gate

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "init.defaultBranch"
  GIT_CONFIG_VALUE_0: "main"

jobs:
  workflow-lint:
    name: Main Releasability / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-actionlint@v1

  lint-typecheck-security:
    name: Main Releasability / Lint Typecheck Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Verify Dependencies
        run: ./.venv/bin/python -m pip check
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Architecture Boundary Gate
        run: make architecture-boundary-gate
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: Security Audit
        run: make security-audit

  test-suites:
    name: Main Releasability / Tests (${{ matrix.suite }})
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            path: tests/unit
          - suite: integration
            path: tests/integration
          - suite: e2e
            path: tests/e2e
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run tests with coverage data
        env:
          COVERAGE_FILE: .coverage.${{ matrix.suite }}
        run: ./.venv/bin/python -m pytest ${{ matrix.path }} --cov=src --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-${{ matrix.suite }}
          path: .coverage.${{ matrix.suite }}
          include-hidden-files: true
          if-no-files-found: error

  coverage-gate:
    name: Main Releasability / Coverage Gate (Combined)
    needs: [test-suites]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --no-deprecation
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-data-*
          merge-multiple: true
          path: coverage-data
      - name: Enforce 99% coverage
        run: |
          ./.venv/bin/python -m coverage combine coverage-data
          ./.venv/bin/python -m coverage report --fail-under=99
      - name: Upload coverage summary
        uses: actions/upload-artifact@v7
        with:
          name: main-releasability-coverage-data
          path: |
            .coverage
            coverage-data
          include-hidden-files: true
          if-no-files-found: error

  postgres-runtime-proof:
    name: Main Releasability / PostgreSQL Runtime Proof
    needs: [lint-typecheck-security]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: lotus_idea
          POSTGRES_PASSWORD: lotus_idea
          POSTGRES_USER: lotus_idea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lotus_idea -d lotus_idea"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LOTUS_IDEA_POSTGRES_INTEGRATION_REQUIRED: "1"
      LOTUS_IDEA_POSTGRES_INTEGRATION_URL: postgresql://lotus_idea:lotus_idea@localhost:5432/lotus_idea
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Run PostgreSQL runtime proof
        run: make postgres-integration-gate

  docker-build:
    name: Main Releasability / Validate Docker Build
    needs: [coverage-gate, postgres-runtime-proof]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install
      - name: Build Docker image
        run: make docker-build
      - name: Generate dependency SBOM
        run: |
          ./.venv/bin/python -m pip install cyclonedx-bom
          ./.venv/bin/cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json
      - name: Generate release metadata manifest
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          Path("release-evidence.json").write_text(
              json.dumps(
                  {
                      "repository": os.environ["GITHUB_REPOSITORY"],
                      "commit_sha": os.environ["GITHUB_SHA"],
                      "ref": os.environ["GITHUB_REF"],
                      "workflow": os.environ["GITHUB_WORKFLOW"],
                      "run_id": os.environ["GITHUB_RUN_ID"],
                      "dockerfile_path": "Dockerfile",
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
      - name: Upload release evidence
        uses: actions/upload-artifact@v7
        with:
          name: main-releasability-release-evidence
          path: |
            sbom.cdx.json
            release-evidence.json
          if-no-files-found: error
