groups:
  - name: lotus-idea-operator-workflows-operations
    rules:
      - alert: LotusIdeaSourceIngestionReadinessBlocked
        expr: sum(increase(lotus_idea_operation_events_total{operation=~"source_ingestion_readiness_read|source_ingestion_run_once",outcome=~"blocked|invalid_state"}[15m])) > 0
        for: 15m
        labels:
          alert_id: source-ingestion-readiness-blocked
          severity: P3
          owner_repo: lotus-idea
        annotations:
          summary: Source ingestion readiness or run-once posture is blocked.
          runbook: docs/runbooks/operator-workflows-operations.md#source-ingestion-readiness-blocked
      - alert: LotusIdeaOutboxDeliveryReadinessBlocked
        expr: sum(increase(lotus_idea_operation_events_total{operation=~"outbox_delivery_readiness_read|outbox_delivery_run_once",outcome=~"blocked|invalid_state"}[15m])) > 0
        for: 15m
        labels:
          alert_id: outbox-delivery-readiness-blocked
          severity: P3
          owner_repo: lotus-idea
        annotations:
          summary: Outbox delivery readiness or run-once posture is blocked.
          runbook: docs/runbooks/operator-workflows-operations.md#outbox-delivery-readiness-blocked
      - alert: LotusIdeaOutboxDeliveryCollectionFailed
        expr: min(lotus_idea_outbox_delivery_collection_success{repository="lotus-idea"}) < 1
        for: 5m
        labels:
          alert_id: outbox-delivery-collection-failed
          severity: P2
          owner_repo: lotus-idea
        annotations:
          summary: Outbox supportability projection cannot be collected.
          runbook: docs/runbooks/operator-workflows-operations.md#outbox-delivery-collection-failed
      - alert: LotusIdeaOutboxDeliveryDeadLetterPresent
        expr: sum(lotus_idea_outbox_delivery_events{repository="lotus-idea",state="dead_letter"}) > 0
        for: 15m
        labels:
          alert_id: outbox-delivery-dead-letter-present
          severity: P2
          owner_repo: lotus-idea
        annotations:
          summary: Dead-lettered outbox events require governed recovery review.
          runbook: docs/runbooks/operator-workflows-operations.md#outbox-delivery-dead-letter-present
      - alert: LotusIdeaOutboxDeliveryExpiredLeasePresent
        expr: sum(lotus_idea_outbox_delivery_events{repository="lotus-idea",state="expired_lease"}) > 0
        for: 10m
        labels:
          alert_id: outbox-delivery-expired-lease-present
          severity: P2
          owner_repo: lotus-idea
        annotations:
          summary: Expired outbox delivery leases are not recovering promptly.
          runbook: docs/runbooks/operator-workflows-operations.md#outbox-delivery-expired-lease-present
      - alert: LotusIdeaOutboxDeliveryBacklogStalled
        expr: (sum(lotus_idea_outbox_delivery_events{repository="lotus-idea",state="delivery_ready"}) > 100) or (max(lotus_idea_outbox_delivery_oldest_ready_age_seconds{repository="lotus-idea"}) > 900)
        for: 15m
        labels:
          alert_id: outbox-delivery-backlog-stalled
          severity: P2
          owner_repo: lotus-idea
        annotations:
          summary: Delivery-ready outbox backlog count or age exceeds its operating threshold.
          runbook: docs/runbooks/operator-workflows-operations.md#outbox-delivery-backlog-stalled
      - alert: LotusIdeaOutboxDeliveryRetryPressure
        expr: sum(lotus_idea_outbox_delivery_events{repository="lotus-idea",state="retry_deferred"}) > 50
        for: 30m
        labels:
          alert_id: outbox-delivery-retry-pressure
          severity: P3
          owner_repo: lotus-idea
        annotations:
          summary: Deferred outbox retries exceed the operating threshold.
          runbook: docs/runbooks/operator-workflows-operations.md#outbox-delivery-retry-pressure
      - alert: LotusIdeaDownstreamRealizationReadinessBlocked
        expr: sum(increase(lotus_idea_operation_events_total{operation=~"downstream_realization_readiness_read|downstream_realization_submission",outcome=~"blocked|invalid_state|permission_denied"}[15m])) > 0
        for: 15m
        labels:
          alert_id: downstream-realization-readiness-blocked
          severity: P3
          owner_repo: lotus-idea
        annotations:
          summary: Downstream realization readiness or local submission posture is blocked.
          runbook: docs/runbooks/operator-workflows-operations.md#downstream-realization-readiness-blocked
      - alert: LotusIdeaImplementationProofReadinessBlocked
        expr: sum(increase(lotus_idea_operation_events_total{operation=~"mesh_readiness_read|mesh_trust_telemetry_preview_read|mesh_trust_telemetry_snapshot_read|implementation_proof_readiness_read",outcome="blocked"}[30m])) > 0
        for: 30m
        labels:
          alert_id: implementation-proof-readiness-blocked
          severity: P3
          owner_repo: lotus-idea
        annotations:
          summary: Runtime trust telemetry or aggregate implementation-proof readiness is blocked.
          runbook: docs/runbooks/operator-workflows-operations.md#implementation-proof-readiness-blocked
